services:
  - type: web
    name: telegram-shop-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_GROUP_ID
        sync: false
      - key: SUPPORT_USERNAME
        value: ge3369
      - key: WEBHOOK_PATH
        value: telegram-webhook
      - key: BRSAPI_KEY
        sync: false
      - key: CHANNEL_1_ID
        sync: false
      - key: CHANNEL_2_ID
        sync: false
      - key: CHANNEL_3_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: telegram-shop-bot-db
          property: connectionString

databases:
  - name: telegram-shop-bot-db
    plan: free
